<!DOCTYPE html>
<html>

<head>

<title>Staff Control Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background: #0f172a;
height:100vh;
display:block;
justify-content:center;
align-items:center;
}

.panel{

width:500px;
padding:40px;
border-radius:12px;
text-align:center;

}

h1{

margin-bottom:10px;
color:#314dab;

}

.subtitle{

color:#fbbf24;
margin-bottom:30px;

}

.status{

background:#e4c4a0;
padding:20px;
border-radius:10px;
margin-bottom:30px;

}

.status h2{

margin:10px 0;
color:#0f172a;

}

.status h3{

margin:10px 0;
color:#404552;

}

.buttons{

display:flex;
flex-direction:column;
gap:15px;

}

button{

padding:14px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;

}

.next{

background:#808fae;
color:white;

}

.next:hover{

background:#c2c8d3;

}

.pause{

background:#6078ae;
color:white;

}

.pause:hover{

background:#8da3d5;

}

.resume{

background:#2563eb;
color:white;

}

.resume:hover{

background:#1d4ed8;

}

</style>

</head>

<body>

<div class="panel">

<h1>Staff Control Panel</h1>
<p class="subtitle">Manage Queue Tokens</p>

<div class="status">

<h2 id="currentToken">Current Token: None</h2>

<h3 id="queueLength">Queue Length: 0</h3>

</div>

<div class="buttons">

<button class="next" onclick="nextToken()">Call Next Token</button>

<button class="pause" onclick="pauseQueue()">Pause Queue</button>

<button class="resume" onclick="resumeQueue()">Resume Queue</button>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="js/staff.js"></script>

</body>

</html>
