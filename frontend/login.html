<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Digital Queue System - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#1e3a8a,#2563eb,#06b6d4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-card{
width:420px;
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h2{
text-align:center;
margin-bottom:10px;
color:#1e3a8a;
}

.subtitle{
text-align:center;
color:#64748b;
margin-bottom:25px;
}

select,input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #cbd5e1;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="login-card">

<h2>Digital Queue System</h2>
<p class="subtitle">Select your role</p>

<label>Select Role</label>

<select id="roleSelect">

<option value="">Choose Role</option>
<option value="student">Student</option>
<option value="admin">Admin</option>

</select>

<!-- STUDENT LOGIN -->

<form id="studentForm" class="hidden">

<input type="text" placeholder="Enter your name" required>

<input type="email" placeholder="Student Email" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login as Student</button>

</form>

<!-- ADMIN LOGIN -->

<form id="adminForm" class="hidden">

<input type="email" placeholder="Admin Email" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login as Admin</button>

</form>

</div>

<script >
    const roleSelect = document.getElementById("roleSelect");

const studentForm = document.getElementById("studentForm");
const adminForm = document.getElementById("adminForm");

roleSelect.addEventListener("change", function(){

const role = roleSelect.value;

studentForm.classList.add("hidden");
adminForm.classList.add("hidden");

if(role === "student"){

studentForm.classList.remove("hidden");

}

else if(role === "admin"){

adminForm.classList.remove("hidden");

}

});

/* STUDENT LOGIN */

studentForm.addEventListener("submit", function(e){

e.preventDefault();

window.location.href = "/student.html";

});

/* ADMIN LOGIN */

adminForm.addEventListener("submit", function(e){

e.preventDefault();

window.location.href = "/staff.html";

});
</script>

</body>
</html>
